{% extends "_base.html" %}

{% block content %}

<style>
    /* Estilo para garantir que o fundo ocupe 100% da altura da tela */
    .login-wrapper {
        min-height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        
        /* ALTERAÇÃO AQUI: */
        /* Aumentei a tonalidade para um Lilás/Azul visível e moderno */
        /* Roxo Suave (#e2c2ff) -> Azul Suave (#c4ddff) */
        background: linear-gradient(135deg, #e2c2ff 0%, #c4ddff 100%);
    }

    /* O cartão branco */
    .login-card {
        background-color: #ffffff;
        padding: 2.5rem;
        border-radius: 20px;
        /* Sombra um pouco mais marcada para separar o cartão do fundo colorido */
        box-shadow: 0 20px 40px rgba(0, 74, 173, 0.1); 
        width: 100%;
        max-width: 400px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.5); /* Borda translúcida */
    }

    .login-card h2 {
        color: #004aad;
        font-weight: bold;
        margin-bottom: 1.5rem;
    }

    /* Botão Entrar */
    .btn-custom-gradient {
        background: linear-gradient(90deg, #a617ff 0%, #004aad 100%);
        border: none;
        color: white;
        width: 100%;
        padding: 12px;
        border-radius: 50px;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
        margin-top: 10px;
    }

    .btn-custom-gradient:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(166, 23, 255, 0.3);
        opacity: 0.95;
    }

    /* Inputs */
    .login-card input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        box-sizing: border-box;
        background-color: #fcfcfc;
    }

    .login-card input:focus {
        outline: none;
        border-color: #a617ff;
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(166, 23, 255, 0.15); /* Glow um pouco mais forte */
    }
    
    .login-card label {
        display: block;
        text-align: left;
        margin-bottom: 5px;
        color: #555;
        font-weight: 600;
        font-size: 0.9rem;
    }
    
    /* Texto de Registro */
    .register-text {
        margin-top: 1.5rem;
        font-size: 0.95rem;
        color: #666;
    }

    .register-text a {
        color: #a617ff;
        font-weight: bold;
        text-decoration: none;
        transition: color 0.2s;
    }

    .register-text a:hover {
        color: #004aad;
        text-decoration: underline;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Bem-vindo ao AgediFy</h2>
        
        <form method="post">
            {% csrf_token %}
            
            {{ form.as_p }}

            <button type="submit" class="btn btn-custom-gradient">
                Entrar
            </button>
        </form>

        <div class="register-text mt-4">
            <small>
            Não possui conta ainda? 
            <a class="ms-1" href="{% url 'cadastrar_usuario' %}">Registre-se</a>
            </small>
        </div>

    </div>
</div>

{% endblock %}
